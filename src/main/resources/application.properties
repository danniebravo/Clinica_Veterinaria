# ===== Puerto del servidor =====
server.port=8080

# ===== Base de datos H2 (en memoria, no hay que instalar nada) =====
spring.datasource.url=jdbc:h2:mem:clinicadb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA / Hibernate =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===== Consola web de H2 para ver la base de datos =====
# Abrir en: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:clinicadb
# User: sa   (sin contrasena)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
