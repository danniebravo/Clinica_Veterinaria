
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clínica Veterinaria MVC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1E2761;
            min-height: 100vh;
            padding: 40px 20px;
            color: #2B2B3A;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        header p {
            color: #CADCFC;
            font-style: italic;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #1E2761;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 3px solid #FFC93C;
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            font-weight: bold;
            color: #1E2761;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #1E2761;
        }

        button {
            background: #F96167;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        button:hover {
            background: #E54B51;
        }

        #mensaje {
            margin-top: 16px;
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        #mensaje.exito {
            background: #D4EDDA;
            color: #155724;
            display: block;
        }

        #mensaje.error {
            background: #F8D7DA;
            color: #721C24;
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th {
            background: #1E2761;
            color: white;
            padding: 12px;
            text-align: left;
            font-size: 14px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #E5E7EB;
        }

        tr:hover {
            background: #F7F8FC;
        }

        .btn-eliminar {
            background: #F96167;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin: 0;
        }

        .vacio {
            text-align: center;
            color: #6B7280;
            font-style: italic;
            padding: 20px;
        }

        footer {
            text-align: center;
            color: #CADCFC;
            margin-top: 30px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">

        <header>
            <h1>🐾 Clínica Veterinaria MVC</h1>
            <p>Daniela Bravo Basante</p>
        </header>

        <!-- VISTA: el formulario donde el usuario escribe los datos -->
        <div class="card">
            <h2>Registrar nueva mascota</h2>

            <form id="formMascota">
                <div>
                    <label>Nombre</label>
                    <input type="text" id="nombre" placeholder="Ej: Rocky" required>
                </div>
                <div>
                    <label>Tipo</label>
                    <input type="text" id="tipo" placeholder="Ej: Perro, Gato, Hámster" required>
                </div>
                <div>
                    <label>Edad (años)</label>
                    <input type="number" id="edad" placeholder="Ej: 3" min="0" max="40" required>
                </div>
                <button type="submit">Guardar mascota</button>
            </form>

            <div id="mensaje"></div>
        </div>

        <!-- Lista de mascotas registradas (también es parte de la Vista) -->
        <div class="card">
            <h2>Mascotas registradas</h2>
            <div id="tablaContenedor">
                <p class="vacio">Aún no hay mascotas registradas. ¡Registra la primera arriba! 🐶</p>
            </div>
        </div>

        <footer>
            Proyecto educativo · Modelo (Mascota) + Vista (HTML) + Controlador (Spring Boot)
        </footer>
    </div>

    <script>
        // ============================================================
        // LA VISTA se comunica con el CONTROLADOR enviando peticiones
        // al servidor en http://localhost:8080/mascotas
        //
        // NO se comunica directamente con el MODELO.
        // Siempre pasa por el CONTROLADOR.
        // ============================================================

        const API = '/mascotas';

        // Escuchar cuando el usuario envía el formulario
        document.getElementById('formMascota').addEventListener('submit', async (e) => {
            e.preventDefault();

            // 1. La VISTA toma los datos del formulario
            const mascota = {
                nombre: document.getElementById('nombre').value,
                tipo:   document.getElementById('tipo').value,
                edad:   parseInt(document.getElementById('edad').value)
            };

            console.log('VISTA: enviando datos al CONTROLADOR...', mascota);

            try {
                // 2. La VISTA llama al CONTROLADOR para que guarde la mascota
                const respuesta = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(mascota)
                });

                if (!respuesta.ok) throw new Error('Error al guardar');

                const guardada = await respuesta.json();
                console.log('CONTROLADOR respondió:', guardada);

                // 3. La VISTA muestra el resultado al usuario
                mostrarMensaje(`✓ Mascota ${guardada.nombre} registrada correctamente (ID: ${guardada.id})`, 'exito');
                document.getElementById('formMascota').reset();

                // Recargar la lista
                cargarMascotas();

            } catch (err) {
                mostrarMensaje('✗ Error al guardar la mascota', 'error');
                console.error(err);
            }
        });

        // Cargar las mascotas desde el Controlador y mostrarlas
        async function cargarMascotas() {
            try {
                const respuesta = await fetch(API);
                const mascotas = await respuesta.json();

                const contenedor = document.getElementById('tablaContenedor');

                if (mascotas.length === 0) {
                    contenedor.innerHTML = '<p class="vacio">Aún no hay mascotas registradas. ¡Registra la primera arriba! 🐶</p>';
                    return;
                }

                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Tipo</th>
                                <th>Edad</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                mascotas.forEach(m => {
                    html += `
                        <tr>
                            <td>${m.id}</td>
                            <td><strong>${m.nombre}</strong></td>
                            <td>${m.tipo}</td>
                            <td>${m.edad} años</td>
                            <td><button class="btn-eliminar" onclick="eliminarMascota(${m.id})">Eliminar</button></td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                contenedor.innerHTML = html;

            } catch (err) {
                console.error('Error al cargar mascotas:', err);
            }
        }

        // Eliminar una mascota
        async function eliminarMascota(id) {
            if (!confirm('¿Seguro que deseas eliminar esta mascota?')) return;

            try {
                await fetch(`${API}/${id}`, { method: 'DELETE' });
                mostrarMensaje('Mascota eliminada', 'exito');
                cargarMascotas();
            } catch (err) {
                mostrarMensaje('Error al eliminar', 'error');
            }
        }

        function mostrarMensaje(texto, tipo) {
            const msg = document.getElementById('mensaje');
            msg.textContent = texto;
            msg.className = tipo;
            setTimeout(() => { msg.className = ''; msg.style.display = 'none'; }, 4000);
        }

        // Al cargar la página, mostrar las mascotas que ya existen
        cargarMascotas();
    </script>
</body>
</html>
