
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clínica Veterinaria MVC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1E2761;
            min-height: 100vh;
            padding: 40px 20px;
            color: #2B2B3A;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        header p {
            color: #CADCFC;
            font-style: italic;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #1E2761;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 3px solid #FFC93C;
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            font-weight: bold;
            color: #1E2761;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #1E2761;
        }

        button {
            background: #F96167;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        button:hover {
            background: #E54B51;
        }

        #mensaje {
            margin-top: 16px;
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        #mensaje.exito {
            background: #D4EDDA;
            color: #155724;
            display: block;
        }

        #mensaje.error {
            background: #F8D7DA;
            color: #721C24;
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th {
            background: #1E2761;
            color: white;
            padding: 12px;
            text-align: left;
            font-size: 14px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #E5E7EB;
        }

        tr:hover {
            background: #F7F8FC;
        }

        .btn-eliminar {
            background: #F96167;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin: 0;
        }

        .vacio {
            text-align: center;
            color: #6B7280;
            font-style: italic;
            padding: 20px;
        }

        footer {
            text-align: center;
            color: #CADCFC;
            margin-top: 30px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">

        <header>
            <h1>🐾 Clínica Veterinaria MVC</h1>
            <p>Daniela Bravo Basante</p>
        </header>

        <!-- VISTA: el formulario donde el usuario escribe los datos -->
        <div class="card">
            <h2>Registrar nueva mascota</h2>

            <form id="formMascota">
                <div>
                    <label>Nombre</label>
                    <input type="text" id="nombre" placeholder="Ej: Rocky" required>
                </div>
                <div>
                    <label>Tipo</label>
                    <input type="text" id="tipo" placeholder="Ej: Perro, Gato, Hámster" required>
                </div>
                <div>
                    <label>Edad (años)</label>
                    <input type="number" id="edad" placeholder="Ej: 3" min="0" max="40" required>
                </div>
                <button type="submit">Guardar mascota</button>
            </form>

            <div id="mensaje"></div>
        </div>

        <!-- Lista de mascotas registradas (también es parte de la Vista) -->
        <div class="card">
            <h2>Mascotas registradas</h2>
            <div id="tablaContenedor">
                <p class="vacio">Aún no hay mascotas registradas. ¡Registra la primera arriba! 🐶</p>
            </div>
        </div>

        <footer>
            Proyecto educativo · Modelo (Mascota) + Vista (HTML) + Controlador (Spring Boot)
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
